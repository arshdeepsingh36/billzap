<!DOCTYPE html>
<html>
<head>
  <title>BillZap — Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #1a1a2e; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .register-card { background: #fff; border-radius: 16px; padding: 40px; width: 100%; max-width: 480px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .brand { color: #667eea; font-size: 28px; font-weight: 700; text-align: center; margin-bottom: 8px; }
    .brand span { color: #1a1a2e; }
    .subtitle { text-align: center; color: #888; margin-bottom: 30px; font-size: 14px; }
    .btn-register { background: linear-gradient(135deg, #11998e, #38ef7d); border: none; width: 100%; padding: 12px; border-radius: 8px; color: #1a1a2e; font-weight: 600; font-size: 16px; }
    .btn-register:hover { opacity: 0.9; }
    .form-control:focus { border-color: #667eea; box-shadow: 0 0 0 0.2rem rgba(102,126,234,.25); }
    .plan-card { border: 2px solid #eee; border-radius: 10px; padding: 15px; cursor: pointer; transition: all 0.2s; margin-bottom: 10px; }
    .plan-card:hover { border-color: #667eea; background: #f8f0ff; }
    .plan-card input[type=radio]:checked + .plan-content { color: #667eea; }
    .login-link { text-align: center; margin-top: 20px; font-size: 14px; }
    .login-link a { color: #667eea; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <div class="register-card">
    <div class="brand">☁ Bill<span>Zap</span></div>
    <div class="subtitle">Create your account and choose a plan</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }} py-2">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <div class="mb-3">
        <label class="form-label fw-semibold">Full Name</label>
        <input type="text" name="name" class="form-control" placeholder="Enter your full name" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Email Address</label>
        <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Create a password" required>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Choose Your Plan</label>
        {% for plan in plans %}
        <label class="plan-card d-flex align-items-center gap-3">
          <input type="radio" name="plan_id" value="{{ plan.id }}" required>
          <div class="plan-content">
            <div class="fw-bold">{{ plan.name }}</div>
            <div class="text-muted" style="font-size:13px;">{{ plan.features }}</div>
          </div>
          <div class="ms-auto fw-bold text-primary">${{ plan.price }}/mo</div>
        </label>
        {% endfor %}
      </div>
      <button type="submit" class="btn btn-register">Create Account</button>
    </form>

    <div class="login-link">
      Already have an account? <a href="/login">Sign in</a>
    </div>
  </div>
</body>
</html>
